# Nightly regeneration -- the 的確表示義務 (keep postings accurate and
# current) as automation: refresh web/postings.edn from real, live,
# ToS-compliant open job-board sources (web/sources.edn -> web/collect.cljs
# -> the public Greenhouse Job Board API, no auth/scraping/bot-detection
# evasion -- see collect.cljs's own header), rebuild docs/ through the
# real actor from that data, verify with the headless harnesses, and
# commit only when something actually changed. A posting whose source
# closed since the last run is HARD-held by the stale-vacancy gate (or,
# for postings.edn's own gh-* entries, carried forward by collect.cljs
# with :source-vacancy-closed? true the moment it disappears from its
# source board) and thereby leaves the index.
#
# Fork note: this runs on the default GITHUB_TOKEN (contents: write).
# If your org disables Actions, run the same three commands from any
# scheduler (see docs/operator-quickstart.md §4).
name: regenerate-board
on:
  schedule:
    - cron: '23 17 * * *'   # 02:23 JST nightly (off-minute on purpose)
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: cloud-itonami/cloud-itonami-isic-6399
      - uses: actions/checkout@v4
        with: {repository: kotoba-lang/html, path: kotoba-lang/html}
      - uses: actions/checkout@v4
        with: {repository: kotoba-lang/css, path: kotoba-lang/css}
      - uses: actions/checkout@v4
        with: {repository: kotoba-lang/langchain, path: kotoba-lang/langchain}
      - uses: actions/checkout@v4
        with: {repository: kotoba-lang/langchain-store, path: kotoba-lang/langchain-store}
      - uses: actions/checkout@v4
        with: {repository: kotoba-lang/langgraph, path: kotoba-lang/langgraph}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: install nbb
        run: npm install nbb
      - name: collect real postings from open job-board sources
        working-directory: cloud-itonami/cloud-itonami-isic-6399/web
        # Only the org's own upstream repo carries web/sources.edn -- an
        # operator fork without it keeps using its own hand-authored
        # postings.edn (or the demo set) untouched, same fork-safety
        # posture as the existing $([ -f postings.edn ]) check below.
        run: |
          if [ -f sources.edn ]; then
            npx nbb --classpath "../src" collect.cljs
          else
            echo "no sources.edn -- skipping real-data collection"
          fi
      - name: regenerate through the real actor
        working-directory: cloud-itonami/cloud-itonami-isic-6399/web
        # npx resolves the workspace-root node_modules regardless of the
        # checkout depth (which differs from the monorepo layout here).
        run: |
          npx nbb \
            --classpath "../src:../../../kotoba-lang/html/src:../../../kotoba-lang/css/src:../../../kotoba-lang/langchain/src:../../../kotoba-lang/langchain-store/src:../../../kotoba-lang/langgraph/src" \
            generate.cljs $( [ -f postings.edn ] && echo postings.edn )
      - name: verify (headless harness)
        working-directory: cloud-itonami/cloud-itonami-isic-6399/web
        # verify_search's fixtures describe the demo set; operator forks
        # get a generic sanity check instead (the ledger section only
        # exists when the actor actually ran).
        run: |
          if [ -f postings.edn ]; then
            grep -q '監査台帳' ../docs/index.html && echo "operator board sanity ok"
          else
            npx nbb verify_search.cljs
          fi
      - name: commit when changed
        working-directory: cloud-itonami/cloud-itonami-isic-6399
        # web/postings.edn is staged too when present -- it's collect.cljs's
        # own state (the baseline next run's close-vanished diffs against
        # to detect source-side closures), not just a build artifact.
        run: |
          if ! git diff --quiet docs/ web/postings.edn 2>/dev/null; then
            git config user.name "regenerate-board[bot]"
            git config user.email "noreply@github.com"
            git add docs/
            [ -f web/postings.edn ] && git add web/postings.edn
            git commit -m "chore(board): nightly regeneration through the actor (的確表示)"
            git push
          else
            echo "board unchanged"
          fi
